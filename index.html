<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>

<style>
    :root {
        --primary: #3cff8f;
        --secondary: #8a2be2;
        --bg: #050510;
        --panel: rgba(31, 31, 46, 0.8);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: white;
        text-align: center;
        overflow-x: hidden;
        cursor: crosshair;
        transition: box-shadow 0.5s;
    }

    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* LANGUAGE SWITCHER */
    .lang-menu {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 350px;
        z-index: 100;
    }

    .lang-btn {
        padding: 5px 10px;
        font-size: 11px;
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--primary);
        color: var(--primary);
        cursor: pointer;
        transition: 0.3s;
        border-radius: 3px;
        font-weight: bold;
    }

    .lang-btn:hover {
        background: var(--primary);
        color: black;
    }

    .container {
        animation: fadeIn 1.5s ease-out;
        padding: 20px;
        position: relative;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* GLITCH EFFECT */
    h1 {
        font-size: clamp(50px, 10vw, 90px);
        margin-top: 60px;
        letter-spacing: 10px;
        color: var(--primary);
        display: inline-block;
        cursor: default;
    }

    h1:hover {
        animation: glitch 0.3s infinite;
        text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9;
    }

    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }

    /* DOWNLOAD BUTTON */
    .btn-download {
        background: var(--primary) !important;
        color: black !important;
        font-weight: 900 !important;
        padding: 15px 45px !important;
        font-size: 22px !important;
        box-shadow: 0 0 20px var(--primary);
        border: none !important;
        cursor: pointer;
        border-radius: 5px;
        margin: 25px 0;
        text-transform: uppercase;
        transition: 0.3s;
    }

    .btn-download:hover { 
        transform: scale(1.1) rotate(-1deg); 
        box-shadow: 0 0 40px var(--primary); 
    }

    .nav-btn {
        padding: 12px 25px;
        margin: 8px;
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        cursor: pointer;
        text-transform: uppercase;
        font-weight: bold;
        transition: 0.3s;
    }

    .nav-btn:hover { background: var(--primary); color: black; }

    /* PROGRESS BAR */
    .progress-container { width: 80%; max-width: 500px; margin: 40px auto; }
    .progress { background: #111; height: 25px; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
    .progress-bar { 
        width: 27%; height: 100%; 
        background: linear-gradient(90deg, var(--secondary), var(--primary)); 
        background-size: 200% 200%;
        animation: gradientMove 3s linear infinite; 
    }

    @keyframes gradientMove { 
        0% { background-position: 0% 50%; } 
        100% { background-position: 200% 50%; } 
    }

    /* CONTENT BOX */
    #content {
        min-height: 160px;
        background: var(--panel);
        max-width: 700px;
        margin: 20px auto;
        padding: 30px;
        border-radius: 12px;
        backdrop-filter: blur(8px);
        border-left: 4px solid var(--primary);
        text-align: left;
        line-height: 1.6;
    }

    /* SECRET BOX */
    .secret { margin-top: 60px; padding-bottom: 80px; }
    .secret input { 
        padding: 12px; 
        background: #000; 
        color: var(--primary); 
        border: 1px solid #444; 
        outline: none;
        width: 250px;
    }
    #secretText { 
        margin-top: 20px; 
        min-height: 24px; 
        font-weight: bold; 
        text-shadow: 0 0 10px var(--primary);
    }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="lang-menu">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('cs')">CZ</button>
    <button class="lang-btn" onclick="setLang('sk')">SK</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('pl')">PL</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('sv')">SV</button>
    <button class="lang-btn" onclick="setLang('ja')">JP</button>
</div>

<div class="container">
    <h1>VOXELIA</h1>
    <p id="subtitle" class="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>

    <div class="download-section">
        <button id="btn-dl" class="btn-download" onclick="triggerDl()">DOWNLOAD ALPHA</button>
    </div>

    <div class="btn-group">
        <button id="btn-lore" class="nav-btn" onclick="showLore()">Lore</button>
        <button id="btn-boss" class="nav-btn" onclick="showBoss()">Bosses</button>
    </div>

    <div id="content">Select a module above...</div>

    <div class="progress-container">
        <p id="prog-text">SYSTEM RECONSTRUCTION</p>
        <div class="progress"><div class="progress-bar"></div></div>
    </div>

    <div class="secret">
        <h3 id="secret-title">Decryption Terminal</h3>
        <input id="codeInput" placeholder="Enter code...">
        <button id="btn-decrypt" class="nav-btn" style="padding: 10px 20px; font-size: 14px;" onclick="checkCode()">Decrypt</button>
        <div id="secretText"></div>
    </div>
</div>

        secretKey: "tajnyvoxel",
        bonusLore: "DATA OBNOVENA: Titáni byli kdysi lidé, kteří se pokusili nahrát své vědomí do sítě."
    },

        dl: "STIAHNUŤ ALFU", lore: "Príbeh", boss: "Bossia",
        prog: "REKONŠTRUKCIA SYSTÉMU", secT: "Dešifrovací Terminál", decB: "Dešifrovať",
        wait: "Vyber modul...", dlMsg: "Pripravujem sťahovanie...",
        loreCont: "<h2>> DATA JADRA</h2><p>Voxelie je živá štruktúra. Chyba v jadre spôsobila skazu. Ty si Rebuilder. Oprav kód. Poraz Titánov.</p>",

let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('subtitle').innerText = t.sub;
    document.getElementById('btn-dl').innerText = t.dl;
    document.getElementById('btn-lore').innerText = t.lore;
    document.getElementById('btn-boss').innerText = t.boss;
    document.getElementById('prog-text').innerText = t.prog;
    document.getElementById('secret-title').innerText = t.secT;
    document.getElementById('btn-decrypt').innerText = t.decB;
    document.getElementById('content').innerText = t.wait;
}

function showLore() { typeWriter(translations[currentLang].loreCont, "content"); }
function showBoss() { typeWriter(translations[currentLang].bossCont, "content"); }
function triggerDl() { alert(translations[currentLang].dlMsg); }

function typeWriter(text, elementId) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') {
                let tagEnd = text.indexOf('>', i);
                element.innerHTML += text.substring(i, tagEnd + 1);
                i = tagEnd + 1;
            } else {
                element.innerHTML += text.charAt(i);
                i++;
            }
            setTimeout(typing, 12);
        }
    }
    typing();
}

function checkCode() {
    const inputField = document.getElementById("codeInput");
    const code = inputField.value.toLowerCase().trim();
    const st = document.getElementById("secretText");
    let foundBonus = null;

    for (let lang in translations) {
        if (code === translations[lang].secretKey.toLowerCase()) {
            foundBonus = translations[lang].bonusLore;
            break;
        }
    }

    if (foundBonus) {
        st.style.color = "var(--primary)";
        typeWriter(`> ACCESS GRANTED: ${foundBonus}`, "secretText");
        document.body.style.boxShadow = "inset 0 0 150px var(--secondary)";
        setTimeout(() => { document.body.style.boxShadow = "none"; }, 1500);
        inputField.value = "";
    } else {
        st.style.color = "#ff4444";
        st.innerHTML = "> ERROR: INVALID_KEY";
        inputField.style.animation = "glitch 0.2s 2";
        setTimeout(() => inputField.style.animation = "", 200);
    }
}

// Background Particles
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const particles = [];
for(let i=0; i<60; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*3+1, v:Math.random()*0.5+0.1});
function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#3cff8f15";
    particles.forEach(p => { ctx.fillRect(p.x, p.y, p.s, p.s); p.y -= p.v; if(p.y < -5) p.y = canvas.height+5; });
    requestAnimationFrame(animate);
}
animate();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
</script>
