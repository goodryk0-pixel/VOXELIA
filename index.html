<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>
<style>
    :root { 
        --primary: #3cff8f; 
        --secondary: #8a2be2; 
        --bg: #050510; 
        --panel: rgba(10, 10, 26, 0.9); 
        --owner: #ff2a2a;
    }
    
    body { 
        margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
        text-align: center; overflow-x: hidden; cursor: crosshair; transition: 0.8s;
    }

    body.void-mode { --primary: #ff2a2a; --secondary: #4b0082; background: #0d0005; }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

    .top-bar { display: flex; justify-content: space-between; padding: 20px; z-index: 100; position: relative; }
    .status-group { text-align: left; font-family: monospace; font-size: 11px; color: var(--primary); }
    .lang-menu { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 500px; }
    .lang-btn { padding: 4px 8px; font-size: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; border-radius: 3px; }
    .lang-btn:hover { background: var(--primary); color: #000; }

    h1 { font-size: clamp(40px, 8vw, 90px); margin: 20px 0; letter-spacing: 12px; color: var(--primary); cursor: pointer; text-shadow: 0 0 15px var(--primary); }
    
    .auth-container { background: var(--panel); border: 1px solid var(--primary); padding: 20px; max-width: 320px; margin: 10px auto; border-radius: 5px; }
    .auth-container input { width: 85%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid var(--primary); color: white; }
    
    #user-profile { background: rgba(60, 255, 143, 0.1); padding: 20px; border-radius: 5px; margin: 20px auto; max-width: 500px; display: none; border: 1px solid var(--primary); }
    .admin-badge { background: var(--owner); color: white; padding: 2px 10px; font-size: 10px; border-radius: 10px; display: none; margin-bottom: 10px; }

    #admin-panel { background: #1a0000; border: 2px solid var(--owner); padding: 15px; margin: 20px auto; max-width: 500px; display: none; text-align: left; font-family: monospace; }
    .admin-ctrl { color: var(--owner); border: 1px solid var(--owner); padding: 5px; margin: 5px; cursor: pointer; background: none; font-size: 10px; }

    .btn-main { background: var(--primary); color: black; font-weight: 900; padding: 15px 40px; border: none; cursor: pointer; border-radius: 5px; margin: 10px; text-transform: uppercase; box-shadow: 0 0 15px var(--primary); transition: 0.3s; }
    #content { min-height: 180px; background: var(--panel); max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 5px; border-left: 5px solid var(--primary); text-align: left; line-height: 1.6; }
    
    .secret { margin-top: 40px; padding-bottom: 50px; }
    .secret input { background:black; border:1px solid var(--primary); color:var(--primary); width:150px; padding:5px; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-bar">
    <div class="status-group">
        <div>SERVER: <span id="srv-text">ONLINE</span></div>
        <div>INTEGRITY: 100%</div>
        <div id="clock">TIME: --:--:--</div>
    </div>
    <div class="lang-menu" id="lang-btns"></div>
</div>

<div class="container">
    <h1 onclick="toggleVoid()">VOXELIA</h1>

    <div id="auth-box" class="auth-container">
        <h4 id="auth-title">SYSTEM ACCESS</h4>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div style="display:flex; gap:5px; justify-content: center;">
            <button id="reg-btn" class="lang-btn" onclick="register()">REGISTER</button>
            <button id="log-btn" class="lang-btn" onclick="login()" style="background:var(--primary); color:black;">LOGIN</button>
        </div>
    </div>

    <div id="user-profile">
        <div id="admin-tag" class="admin-badge">SYSTEM OWNER</div>
        <h3>REBUILDER: <span id="display-name">---</span></h3>
        <p id="display-rank">RANK: --- | XP: 0</p>
        <button id="logout-btn" class="lang-btn" onclick="logout()">LOGOUT</button>
        <button id="admin-btn-toggle" class="lang-btn" style="border-color:var(--owner); color:var(--owner); display:none;" onclick="toggleAdminPanel()">OPEN ADMIN PANEL</button>
    </div>

    <div id="admin-panel">
        <div style="color:var(--owner); font-weight: bold; margin-bottom: 10px;">> ROOT_INTERFACE</div>
        <div style="display:flex; gap:5px;">
            <button class="admin-ctrl" onclick="toggleServerStatus()">TOGGLE SERVER</button>
        </div>
    </div>

    <p id="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>
    <button id="btn-dl" class="btn-main" onclick="alert('Accessing...')">DOWNLOAD ALPHA</button>

    <div style="margin: 20px;">
        <button id="btn-lore" class="lang-btn" style="padding:10px 15px;" onclick="showLore()">LORE</button>
        <button id="btn-boss" class="lang-btn" style="padding:10px 15px;" onclick="showBoss()">BOSSES</button>
        <button id="btn-upd" class="lang-btn" style="padding:10px 15px;" onclick="showUpdates()">UPDATES</button>
    </div>

    <div id="content">Welcome, Rebuilder. Authorization required.</div>

    <div class="secret">
        <h4 id="term-title">DECRYPTION TERMINAL</h4>
        <input id="codeInput" placeholder="Code...">
        <button id="exec-btn" class="lang-btn" onclick="checkCode()">EXECUTE</button>
        <div id="secretText" style="margin-top:10px; font-size:12px; color:var(--primary); font-family: monospace; height: 20px;"></div>
    </div>
</div>

<script>
const OWNER_USER = "goodryk";
const OWNER_PASS = "Jjsjjseco";
const ALL_SECRET_KEYS = ["tajnyvoxel", "secretvoxel", "geheimvoxel", "sekretnyvoxel", "voxelosecreto", "hemligvoxel", "himitsuvoxel"];

const translations = {
    cz: {
        sub: "Přestav svět. Znič zkažené Titány.", dl: "STÁHNOUT ALFU", secret: "> KÓD PŘIJAT. ODEMYKÁM LORE...",
        term: "DEŠIFROVACÍ TERMINÁL", exec: "PROVÉST", reg: "REGISTRACE", log: "PŘIHLÁSIT", out: "ODHLÁSIT",
        welcome: "Vítej, Rebuildere. Pro přístup k datům je nutná autorizace.",
        loreS: "<h2>> LORE</h2><p>Voxelie byla digitální simulací. Velký Glitch ji roztříštil. Vy jste poslední Rebuildeři.</p>",
        loreF: "<h2>> LORE [DEŠIFROVÁNO]</h2><p>Voxelie byla digitální simulací. Jádro bylo infikováno virem 'VOID-0'. Jediná cesta je re-formace sektorů.</p>",
        boss: "<h2>> TITÁNI</h2><p>1. Stone Titan (Peaks)<br>2. Void Serpent (Core)<br>3. Corrupted Core (Final)</p>"
    },
    sk: {
        sub: "Prestav svet. Znič skazených Titánov.", dl: "STIAHNUŤ ALFU", secret: "> KÓD PRIJATÝ. ODEMYKÁM LORE...",
        term: "DEŠIFROVACÍ TERMINÁL", exec: "VYKONAŤ", reg: "REGISTRÁCIA", log: "PRIHLÁSIŤ", out: "ODHLÁSIŤ",
        welcome: "Vitaj, Rebuilder. Pre prístup k dátam je nutná autorizácia.",
        loreS: "<h2>> LORE</h2><p>Voxelie bola digitálna simulácia. Veľký Glitch ju roztrieštil. Vy ste poslední Rebuilderi.</p>",
        loreF: "<h2>> LORE [DEŠIFROVANÉ]</h2><p>Jadro bolo infikované vírusom 'VOID-0'. Re-formácia sektorov je jediná cesta.</p>",
        boss: "<h2>> TITÁNI</h2><p>1. Stone Titan<br>2. Void Serpent<br>3. Corrupted Core</p>"
    },
    en: {
        sub: "Rebuild the world. Destroy the corrupted Titans.", dl: "DOWNLOAD ALPHA", secret: "> ACCESS GRANTED. UNLOCKING LORE...",
        term: "DECRYPTION TERMINAL", exec: "EXECUTE", reg: "REGISTER", log: "LOGIN", out: "LOGOUT",
        welcome: "Welcome, Rebuilder. Authorization required for data access.",
        loreS: "<h2>> LORE</h2><p>Voxelia was a digital simulation. The Great Glitch shattered it. You are the Rebuilders.</p>",
        loreF: "<h2>> LORE [DECRYPTED]</h2><p>Infected by VOID-0. Re-formation of sectors is the only way to save reality.</p>",
        boss: "<h2>> TITANS</h2><p>1. Stone Titan<br>2. Void Serpent<br>3. Corrupted Core</p>"
    },
    ua: {
        sub: "Перебудуй світ. Знищ зіпсованих Титанів.", dl: "ЗАВАНТАЖИТИ АЛЬФУ", secret: "> КОД ПРИЙНЯТО. РОЗБЛОКУВАННЯ...",
        term: "ТЕРМІНАЛ ДЕШИФРУВАННЯ", exec: "ВИКОНАТИ", reg: "РЕЄСТРАЦІЯ", log: "УВІЙТИ", out: "ВИЙТИ",
        welcome: "Вітаємо, Rebuilder. Для доступу до даних потрібна авторизація.",
        loreS: "<h2>> ІСТОРІЯ</h2><p>Вокселія була цифровою симуляцією. Великий Глітч зруйнував її. Ви - останні Rebuilders.</p>",
        loreF: "<h2>> ІСТОРІЯ [РОЗШИФРОВАНО]</h2><p>Ядро інфіковано вірусом 'VOID-0'. Єдиний шлях - реформація секторів.</p>",
        boss: "<h2>> ТИТАНИ</h2><p>1. Stone Titan<br>2. Void Serpent<br>3. Corrupted Core</p>"
    },
    pl: {
        sub: "Odbuduj świat. Zniszcz skażonych Tytanów.", dl: "POBIERZ ALPHĘ", secret: "> KOD PRZYJĘTY. ODBLOKOWYWANIE...",
        term: "TERMINAL DESZYFROWANIA", exec: "WYKONAJ", reg: "REJESTRACJA", log: "ZALOGUJ", out: "WYLOGUJ",
        welcome: "Witaj, Rebuilderze. Autoryzacja wymagana.",
        loreS: "<h2>> LORE</h2><p>Voxelia była symulacją. Wielki Glitch ją roztrzaskał. Jesteście ostatnimi Rebuilderami.</p>",
        loreF: "<h2>> LORE [ODSZYFROWANE]</h2><p>Rdzeń zainfekowany VOID-0. Reformacja sektorów to jedyna droga.</p>",
        boss: "<h2>> TYTANI</h2><p>1. Stone Titan<br>2. Void Serpent<br>3. Corrupted Core</p>"
    },
    de: {
        sub: "Baue die Welt neu auf. Zerstöre die Titanen.", dl: "DOWNLOAD", secret: "> ZUGRIFF GEWÄHRT...",
        term: "ENTSCHLÜSSELUNG", exec: "AUSFÜHREN", reg: "REGISTRIEREN", log: "LOGIN", out: "LOGOUT",
        welcome: "Willkommen. Autorisierung erforderlich.",
        loreS: "<h2>> LORE</h2><p>Voxelia war eine Simulation. Der Great Glitch hat sie zerstört.</p>",
        loreF: "<h2>> LORE [ENTSCHLÜSSELT]</h2><p>Kern mit VOID-0 infiziert. Sektor-Reformierung ist der einzige Weg.</p>",
        boss: "<h2>> TITANEN</h2><p>1. Stone Titan<br>2. Void Serpent<br>3. Corrupted Core</p>"
    }
};

let currentLang = 'cz';
let loreUnlocked = false;

function setLang(l) {
    currentLang = l;
    const t = translations[l] || translations['en'];
    document.getElementById('subtitle').innerText = t.sub;
    document.getElementById('btn-dl').innerText = t.dl;
    document.getElementById('term-title').innerText = t.term;
    document.getElementById('exec-btn').innerText = t.exec;
    document.getElementById('reg-btn').innerText = t.reg;
    document.getElementById('log-btn').innerText = t.log;
    document.getElementById('logout-btn').innerText = t.out;
    document.getElementById('btn-lore').innerText = (l === 'cz' ? 'LORE' : (l === 'ua' ? 'ІСТОРІЯ' : 'LORE'));
    document.getElementById('btn-boss').innerText = (l === 'cz' ? 'BOSSÉ' : (l === 'ua' ? 'ТИТАНИ' : 'BOSSES'));
    
    // Update content if on welcome screen
    if(document.getElementById('content').innerText.includes("Welcome") || document.getElementById('content').innerText.includes("Vítej")) {
        document.getElementById('content').innerText = t.welcome;
    }
}

function showLore() {
    const t = translations[currentLang] || translations['en'];
    typeWriter(loreUnlocked ? t.loreF : t.loreS, "content");
}

function showBoss() {
    const t = translations[currentLang] || translations['en'];
    typeWriter(t.boss, "content");
}

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase().trim();
    const st = document.getElementById("secretText");
    const t = translations[currentLang] || translations['en'];
    if (ALL_SECRET_KEYS.includes(input)) {
        st.innerText = t.secret;
        loreUnlocked = true;
        setTimeout(showLore, 800);
    } else {
        st.innerText = "> ERROR.";
    }
}

function register() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if (!user || !pass) return alert('Fill fields!');
    let users = JSON.parse(localStorage.getItem('voxelia_users') || "[]");
    if (users.find(u => u.name.toLowerCase() === user.toLowerCase()) || user.toLowerCase() === OWNER_USER) return alert('Taken!');
    users.push({name: user, pass: pass, rank: "ALPHA SURVIVOR", xp: 0});
    localStorage.setItem('voxelia_users', JSON.stringify(users));
    alert('Authorized.');
}

function login() {
    const uInput = document.getElementById('username').value.trim();
    const pInput = document.getElementById('password').value;
    if (uInput === OWNER_USER && pInput === OWNER_PASS) return completeLogin(OWNER_USER, "OWNER", 999999);
    let users = JSON.parse(localStorage.getItem('voxelia_users') || "[]");
    const found = users.find(u => u.name === uInput && u.pass === pInput);
    if (found) completeLogin(found.name, found.rank, found.xp);
    else alert('Denied.');
}

function completeLogin(name, rank, xp) {
    localStorage.setItem('voxLogged', 'true');
    localStorage.setItem('voxCurrentName', name);
    localStorage.setItem('voxCurrentRank', rank);
    localStorage.setItem('voxCurrentXP', xp);
    location.reload();
}

function showProfile() {
    const name = localStorage.getItem('voxCurrentName');
    const rank = localStorage.getItem('voxCurrentRank');
    const xp = localStorage.getItem('voxCurrentXP');
    document.getElementById('auth-box').style.display = 'none';
    document.getElementById('user-profile').style.display = 'block';
    const nEl = document.getElementById('display-name');
    nEl.innerText = name.toUpperCase();
    document.getElementById('display-rank').innerText = `RANK: ${rank} | XP: ${xp}`;
    if (rank === "OWNER") {
        nEl.style.color = "var(--owner)";
        document.getElementById('admin-tag').style.display = 'block';
        document.getElementById('admin-btn-toggle').style.display = 'inline-block';
    }
}

function typeWriter(text, elId) {
    let i = 0; const el = document.getElementById(elId); el.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') { let end = text.indexOf('>', i); el.innerHTML += text.substring(i, end + 1); i = end + 1; }
            else { el.innerHTML += text.charAt(i); i++; }
            setTimeout(typing, 8);
        }
    }
    typing();
}

function logout() { localStorage.clear(); location.reload(); }
function toggleAdminPanel() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
function toggleServerStatus() { const s = document.getElementById('srv-text'); s.innerText = s.innerText === 'ONLINE' ? 'OFFLINE' : 'ONLINE'; s.style.color = s.innerText === 'ONLINE' ? 'var(--primary)' : 'var(--owner)'; }
function toggleVoid() { document.body.classList.toggle('void-mode'); document.querySelector('h1').innerText = document.body.classList.contains('void-mode') ? "V O I D" : "VOXELIA"; }

const langContainer = document.getElementById('lang-btns');
Object.keys(translations).forEach(l => {
    const b = document.createElement('button'); b.className = 'lang-btn'; b.innerText = l.toUpperCase();
    b.onclick = () => setLang(l); langContainer.appendChild(b);
});

window.onload = () => { if (localStorage.getItem('voxLogged') === 'true') showProfile(); setInterval(() => { const n = new Date(); document.getElementById('clock').innerText = `TIME: ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`; }, 1000); };

const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const parts = [];
for(let i=0; i<60; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, v:Math.random()*0.5});
function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary') + "33"; parts.forEach(p => { ctx.fillRect(p.x, p.y, 2, 2); p.y -= p.v; if(p.y<0) p.y=canvas.height; }); requestAnimationFrame(anim); }
anim();
</script>
</body>
</html>
