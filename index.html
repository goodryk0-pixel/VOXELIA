<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA CORE | Global Server</title>
<style>
    :root { --primary: #3cff8f; --bg: #050510; --panel: rgba(10, 10, 26, 0.9); --owner: #ff2a2a; }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; overflow-x: hidden; }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

    /* UI Elements */
    .top-bar { display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--primary); }
    .status-group { text-align: left; font-family: monospace; font-size: 11px; color: var(--primary); }
    .lang-menu { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .lang-btn { padding: 4px 6px; font-size: 10px; background: none; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; }
    .lang-btn:hover { background: var(--primary); color: #000; }

    /* Broadcast Alert (Global) */
    #global-broadcast { position: fixed; top: -100px; left: 0; width: 100%; background: var(--owner); color: white; padding: 20px; z-index: 2000; transition: 0.7s cubic-bezier(0.18, 0.89, 0.32, 1.28); font-weight: bold; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 5px 30px rgba(255,0,0,0.5); }

    h1 { font-size: clamp(30px, 10vw, 80px); letter-spacing: 15px; color: var(--primary); text-shadow: 0 0 20px var(--primary); margin: 20px 0; }
    
    .auth-container { background: var(--panel); border: 1px solid var(--primary); padding: 20px; max-width: 320px; margin: 10px auto; }
    input { width: 80%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--primary); color: white; font-family: monospace; }
    
    #user-profile { background: rgba(60, 255, 143, 0.1); padding: 20px; border: 1px solid var(--primary); max-width: 500px; margin: 20px auto; display: none; }
    .xp-bar-bg { width: 100%; background: #111; height: 12px; border: 1px solid var(--primary); margin: 10px 0; }
    #xp-bar-fill { height: 100%; background: var(--primary); width: 0%; transition: 1s; box-shadow: 0 0 10px var(--primary); }

    #admin-panel { background: #1a0000; border: 2px solid var(--owner); padding: 20px; max-width: 500px; margin: 20px auto; display: none; text-align: left; }
    .btn-main { background: var(--primary); color: black; font-weight: bold; padding: 15px 30px; border: none; cursor: pointer; margin: 10px; box-shadow: 0 0 15px var(--primary); }
    #content { min-height: 150px; background: var(--panel); max-width: 700px; margin: 20px auto; padding: 25px; border-left: 4px solid var(--primary); text-align: left; }
</style>
</head>
<body>

<div id="global-broadcast">> [GLOBAL OVERRIDE]: <span id="broadcast-msg"></span></div>
<canvas id="bg-canvas"></canvas>

<div class="top-bar">
    <div class="status-group">
        <div>SERVER: <span id="srv-status" style="color:var(--primary)">SYNCED</span></div>
        <div id="clock">--:--:--</div>
    </div>
    <div class="lang-menu" id="lang-btns"></div>
</div>

<h1>VOXELIA</h1>

<div id="auth-box" class="auth-container">
    <h4 id="t-auth">SYSTEM LOGIN</h4>
    <input type="text" id="username" placeholder="Rebuilder Name">
    <input type="password" id="password" placeholder="Access Key">
    <div style="display:flex; gap:5px; justify-content:center;">
        <button class="lang-btn" onclick="register()" id="t-reg">REGISTER</button>
        <button class="lang-btn" style="background:var(--primary); color:black;" onclick="login()" id="t-log">LOGIN</button>
    </div>
</div>

<div id="user-profile">
    <div id="admin-tag" style="color:var(--owner); font-weight:bold; display:none;">[ROOT ACCESS]</div>
    <h3>USER: <span id="p-name">---</span></h3>
    <p id="p-rank">RANK: SURVIVOR | LVL: 1</p>
    <div class="xp-bar-bg"><div id="xp-bar-fill"></div></div>
    <button class="lang-btn" onclick="gainXP(25)">REBUILD SECTOR (+25 XP)</button>
    <button class="lang-btn" onclick="logout()">LOGOUT</button>
    <button id="admin-btn" class="lang-btn" style="border-color:var(--owner); color:var(--owner); display:none;" onclick="toggleAdmin()">ADMIN PANEL</button>
</div>

<div id="admin-panel">
    <h3 style="color:var(--owner)">> GLOBAL CONTROL</h3>
    <input type="text" id="web-msg" placeholder="Message to ALL users..." style="width:94%; border-color:var(--owner);">
    <button class="btn-main" style="background:var(--owner); color:white; width:100%; margin:0;" onclick="triggerGlobalWeb()">SEND TO ALL SCREENS</button>
</div>

<p id="subtitle">Rebuild the world. Destroy the Titans.</p>
<button class="btn-main" onclick="gainXP(10)" id="t-dl">DOWNLOAD ALPHA</button>

<div style="margin:20px;">
    <button class="lang-btn" style="padding:10px;" onclick="showTab('lore')">LORE</button>
    <button class="lang-btn" style="padding:10px;" onclick="showTab('boss')">BOSSES</button>
    <button class="lang-btn" style="padding:10px;" onclick="showTab('upd')">UPDATES</button>
</div>

<div id="content">Initializing terminal...</div>

<script>
const WEBHOOK_URL = "https://discord.com/api/webhooks/1494279852457459713/ckwnkgfNE4lwPMzJCimxuxQOSYnJzqg-gJYWFQrOxYMTbfG5b6-ucJALufEXnOVaqj7p";

const translations = {
    cz: { sub: "Přestav svět. Znič Titány.", dl: "STÁHNOUT ALFU", reg: "REGISTRACE", log: "PŘIHLÁSIT", lore: "LORE", boss: "BOSSÉ", upd: "AKTUALIZACE" },
    sk: { sub: "Prestav svet. Znič Titánov.", dl: "STIAHNUŤ ALFU", reg: "REGISTRÁCIA", log: "PRIHLÁSIŤ", lore: "LORE", boss: "BOSSÉ", upd: "AKTUALIZÁCIE" },
    en: { sub: "Rebuild the world. Destroy the Titans.", dl: "DOWNLOAD ALPHA", reg: "REGISTER", log: "LOGIN", lore: "LORE", boss: "BOSSES", upd: "UPDATES" },
    ua: { sub: "Відбудуй світ. Знищ Титанів.", dl: "ЗАВАНТАЖИТИ", reg: "РЕЄСТРАЦІЯ", log: "УВІЙТИ", lore: "ІСТОРІЯ", boss: "ТИТАНИ", upd: "ОНОВЛЕННЯ" },
    pl: { sub: "Odbuduj świat. Zniszcz Tytanów.", dl: "POBIERZ ALPHĘ", reg: "REJESTRACJA", log: "ZALOGUJ", lore: "LORE", boss: "TYTANI", upd: "AKTUALIZACJE" },
    de: { sub: "Baue die Welt neu auf.", dl: "DOWNLOAD", reg: "REGISTRIEREN", log: "LOGIN", lore: "LORE", boss: "BOSSEN", upd: "UPDATES" },
    es: { sub: "Reconstruye el mundo.", dl: "DESCARGAR", reg: "REGISTRO", log: "LOGIN", lore: "LORE", boss: "JEFES", upd: "NOTICIAS" },
    fr: { sub: "Reconstruisez le monde.", dl: "TÉLÉCHARGER", reg: "S'INSCRIRE", log: "CONNEXION", lore: "LORE", boss: "BOSS", upd: "MISES À JOUR" }
};

let currentLang = 'cz';
let userXP = 0;
let userLvl = 1;

// --- DISCORD BRIDGE ---
async function postToDiscord(content) {
    try {
        await fetch(WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content })
        });
    } catch (e) { console.error("Discord Fail"); }
}

// --- GLOBAL WEB TRIGGER ---
function triggerGlobalWeb() {
    const msg = document.getElementById('web-msg').value;
    if(!msg) return;
    
    // 1. Odeslání na Discord
    postToDiscord(`📢 **GLOBAL BROADCAST:** ${msg}`);
    
    // 2. Lokální zobrazení
    showGlobalAlert(msg);
    
    // Poznámka: Aby se to ukázalo v reálném čase ostatním, 
    // v profesionální verzi by se zde použila služba "Ably" nebo "Pusher".
    // Pro teď simulujeme live feed přes localStorage pro otevřená okna ve stejném prohlížeči:
    localStorage.setItem('last_global_msg', msg + "||" + Date.now());
}

function showGlobalAlert(msg) {
    const box = document.getElementById('global-broadcast');
    document.getElementById('broadcast-msg').innerText = msg;
    box.style.top = "0";
    setTimeout(() => { box.style.top = "-150px"; }, 5000);
}

// Kontrola "živých" zpráv z jiných oken
setInterval(() => {
    const raw = localStorage.getItem('last_global_msg');
    if(raw) {
        const [msg, time] = raw.split('||');
        if(Date.now() - time < 2000) { // Pokud je zpráva čerstvá (poslaná teď)
            showGlobalAlert(msg);
            localStorage.removeItem('last_global_msg');
        }
    }
}, 1000);

// --- GAME LOGIC ---
function gainXP(amt) {
    userXP += amt;
    if(userXP >= 100) { userXP = 0; userLvl++; postToDiscord(`🆙 **${localStorage.getItem('voxName')}** dosáhl Levelu ${userLvl}!`); }
    updateUI();
    save();
}

function updateUI() {
    document.getElementById('xp-bar-fill').style.width = userXP + "%";
    document.getElementById('p-rank').innerText = `RANK: SURVIVOR | LVL: ${userLvl}`;
}

function setLang(l) {
    currentLang = l;
    const t = translations[l];
    document.getElementById('subtitle').innerText = t.sub;
    document.getElementById('t-dl').innerText = t.dl;
    document.getElementById('t-reg').innerText = t.reg;
    document.getElementById('t-log').innerText = t.log;
    document.getElementById('content').innerText = "Terminal Synced [" + l.toUpperCase() + "]";
}

function login() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if(u === "goodryk" && p === "Jjsjjseco") {
        completeLogin(u, true);
    } else {
        completeLogin(u, false);
    }
}

function completeLogin(name, isOwner) {
    localStorage.setItem('voxLogged', 'true');
    localStorage.setItem('voxName', name);
    localStorage.setItem('voxOwner', isOwner);
    postToDiscord(`👤 **Login:** ${name} vstoupil do Voxelie.`);
    location.reload();
}

function showProfile() {
    document.getElementById('auth-box').style.display = 'none';
    document.getElementById('user-profile').style.display = 'block';
    document.getElementById('p-name').innerText = localStorage.getItem('voxName').toUpperCase();
    if(localStorage.getItem('voxOwner') === 'true') {
        document.getElementById('admin-tag').style.display = 'block';
        document.getElementById('admin-btn').style.display = 'inline-block';
    }
    userXP = parseInt(localStorage.getItem('voxXP') || 0);
    userLvl = parseInt(localStorage.getItem('voxLvl') || 1);
    updateUI();
}

function logout() { localStorage.clear(); location.reload(); }
function toggleAdmin() { const p = document.getElementById('admin-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
function save() { localStorage.setItem('voxXP', userXP); localStorage.setItem('voxLvl', userLvl); }

// --- INIT ---
const langContainer = document.getElementById('lang-btns');
Object.keys(translations).forEach(l => {
    const b = document.createElement('button'); b.className = 'lang-btn'; b.innerText = l.toUpperCase();
    b.onclick = () => setLang(l); langContainer.appendChild(b);
});

window.onload = () => {
    if(localStorage.getItem('voxLogged') === 'true') showProfile();
    setLang('cz');
    setInterval(() => { 
        const n = new Date(); 
        document.getElementById('clock').innerText = n.toLocaleTimeString(); 
    }, 1000);
};

// Particles Background
const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const parts = [];
for(let i=0; i<50; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, v:Math.random()*0.5});
function anim() { 
    ctx.clearRect(0,0,canvas.width,canvas.height); 
    ctx.fillStyle = "#3cff8f22"; 
    parts.forEach(p => { ctx.fillRect(p.x, p.y, 2, 2); p.y -= p.v; if(p.y<0) p.y=canvas.height; }); 
    requestAnimationFrame(anim); 
}
anim();
</script>
</body>
</html>
