<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voxelia</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh; /* Zajistí barvu přes celou obrazovku */
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 60px;
            margin-top: 80px;
            letter-spacing: 5px;
        }

        p {
            color: #aaa;
            font-size: 18px;
        }

        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #66ff88;
            transform: scale(1.1);
        }

        .section {
            margin-top: 100px;
        }

        .card {
            background: #222;
            padding: 20px;
            margin: 20px;
            border-radius: 15px;
            display: inline-block;
            width: 250px;
            vertical-align: top;
        }
    </style>
</head>

<body>

    <h1>VOXELIA</h1>
    <p>Voxel world without limits</p>

    <button onclick="alert('The game is still in development! 😄')">
        Download
    </button>

    <div class="section">
        <h2>About the Game</h2>

        <div class="card">
            🧱 Block-based World
        </div>

        <div class="card">
            🌍 Infinite Generation
        </div>

        <div class="card">
            ⚒️ Crafting System
        </div>
    </div>

</body>
</html>
