<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Voxelia</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(180deg, #0f0f0f, #1a1a1a);
    color: white;
    text-align: center;
}

h1 {
    font-size: 60px;
    margin-top: 80px;
    letter-spacing: 5px;
}

p {
    color: #aaa;
    font-size: 18px;
}

button {
    margin-top: 30px;
    padding: 15px 40px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #66ff88;
    transform: scale(1.1);
}

.section {
    margin-top: 100px;
}

.card {
    background: #222;
    padding: 20px;
    margin: 20px;
    border-radius: 15px;
    display: inline-block;
    width: 250px;
}
</style>
</head>

<body>

<h1>VOXELIA</h1>
<p>Voxelový svět bez limitů</p>

<button onclick="alert('Hra zatím není hotová 😄')">
    Download
</button>

<div class="section">
    <h2>O hře</h2>

    <div class="card">
        🧱 Blokový svět
    </div>

    <div class="card">
        🌍 Nekonečné generování
    </div>

    <div class="card">
        ⚒️ Crafting systém
    </div>
</div>

</body>
</html>
