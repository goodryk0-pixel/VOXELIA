<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>
<style>
    :root { 
        --primary: #3cff8f; 
        --secondary: #8a2be2; 
        --bg: #050510; 
        --panel: rgba(10, 10, 26, 0.9); 
        --owner: #ff2a2a;
    }
    
    body { 
        margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
        text-align: center; overflow-x: hidden; cursor: crosshair; transition: 0.8s;
    }

    body.void-mode { --primary: #ff2a2a; --secondary: #4b0082; background: #0d0005; }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

    .top-bar { display: flex; justify-content: space-between; padding: 20px; z-index: 100; position: relative; }
    .status-group { text-align: left; font-family: monospace; font-size: 11px; color: var(--primary); }
    .lang-menu { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; max-width: 500px; }
    .lang-btn { padding: 4px 8px; font-size: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; border-radius: 3px; }
    .lang-btn:hover { background: var(--primary); color: #000; }

    h1 { font-size: clamp(40px, 8vw, 90px); margin: 20px 0; letter-spacing: 12px; color: var(--primary); cursor: pointer; text-shadow: 0 0 15px var(--primary); }
    
    .auth-container { background: var(--panel); border: 1px solid var(--primary); padding: 20px; max-width: 320px; margin: 10px auto; border-radius: 5px; }
    .auth-container input { width: 85%; padding: 10px; margin: 8px 0; background: #000; border: 1px solid var(--primary); color: white; }
    
    #user-profile { background: rgba(60, 255, 143, 0.1); padding: 20px; border-radius: 5px; margin: 20px auto; max-width: 500px; display: none; border: 1px solid var(--primary); }
    .admin-badge { background: var(--owner); color: white; padding: 2px 10px; font-size: 10px; border-radius: 10px; display: none; margin-bottom: 10px; }

    /* Admin Panel Styling */
    #admin-panel { background: #1a0000; border: 2px solid var(--owner); padding: 15px; margin: 20px auto; max-width: 500px; display: none; text-align: left; font-family: monospace; }
    .admin-ctrl { color: var(--owner); border: 1px solid var(--owner); padding: 5px; margin: 5px; cursor: pointer; background: none; font-size: 10px; }
    .admin-ctrl:hover { background: var(--owner); color: white; }

    .btn-main { background: var(--primary); color: black; font-weight: 900; padding: 15px 40px; border: none; cursor: pointer; border-radius: 5px; margin: 10px; text-transform: uppercase; box-shadow: 0 0 15px var(--primary); transition: 0.3s; }
    #content { min-height: 180px; background: var(--panel); max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 5px; border-left: 5px solid var(--primary); text-align: left; line-height: 1.6; }
    
    .screenshot { width: 140px; height: 70px; background: #111; border: 1px solid var(--primary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: 0.3s; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-bar">
    <div class="status-group">
        <div>SERVER: <span id="srv-text">ONLINE</span></div>
        <div>INTEGRITY: 100%</div>
        <div id="clock">TIME: --:--:--</div>
    </div>
    <div class="lang-menu" id="lang-btns"></div>
</div>

<div class="container">
    <h1 onclick="toggleVoid()">VOXELIA</h1>

    <div id="auth-box" class="auth-container">
        <h4>SYSTEM ACCESS</h4>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div style="display:flex; gap:5px; justify-content: center;">
            <button class="lang-btn" onclick="register()">REGISTER</button>
            <button class="lang-btn" onclick="login()" style="background:var(--primary); color:black;">LOGIN</button>
        </div>
    </div>

    <div id="user-profile">
        <div id="admin-tag" class="admin-badge">SYSTEM OWNER</div>
        <h3>REBUILDER: <span id="display-name">---</span></h3>
        <p id="display-rank">RANK: --- | XP: 0</p>
        <button class="lang-btn" onclick="logout()">LOGOUT</button>
        <button id="admin-btn-toggle" class="lang-btn" style="border-color:var(--owner); color:var(--owner); display:none;" onclick="toggleAdminPanel()">OPEN ADMIN PANEL</button>
    </div>

    <div id="admin-panel">
        <div style="color:var(--owner); font-weight: bold; margin-bottom: 10px;">> ROOT_CONTROL_INTERFACE</div>
        <button class="admin-ctrl" onclick="alert('Broadcasting to all players...')">GLOBAL MESSAGE</button>
        <button class="admin-ctrl" onclick="toggleServerStatus()">TOGGLE SERVER</button>
        <button class="admin-ctrl" onclick="alert('Wiping corrupted data...')">WIPE VOID</button>
        <div id="admin-log" style="font-size: 9px; margin-top: 10px; color: #666;">> Standing by...</div>
    </div>

    <p id="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>
    <button id="btn-dl" class="btn-main" onclick="alert('Establishing connection...')">DOWNLOAD ALPHA</button>

    <div style="margin: 20px;">
        <button class="lang-btn" style="padding:10px 15px;" onclick="showLore()">LORE</button>
        <button class="lang-btn" style="padding:10px 15px;" onclick="showBoss()">BOSSES</button>
        <button class="lang-btn" style="padding:10px 15px;" onclick="showUpdates()">UPDATES</button>
    </div>

    <div id="content">Welcome, Rebuilder. Select a data module.</div>

    <div class="secret" style="margin-top:40px; padding-bottom:50px;">
        <h4 id="secret-title">DECRYPTION TERMINAL</h4>
        <input id="codeInput" placeholder="Enter Code..." style="background:black; border:1px solid var(--primary); color:var(--primary); width:150px; padding:5px;">
        <button class="lang-btn" onclick="checkCode()">EXECUTE</button>
        <div id="secretText" style="margin-top:10px; font-size:12px; color:var(--primary); font-family: monospace;"></div>
    </div>
</div>

<script>
const OWNER_USER = "goodryk";
const OWNER_PASS = "Jjsjjseco";

const translations = {
    cs: { sub: "Přestav svět. Znič zkažené Titány.", dl: "STÁHNOUT ALFU", key: "tajnyvoxel", secret: "> KÓD PŘIJAT. ODEMYKÁM ZBYTEK LORU..." },
    en: { sub: "Rebuild the world. Destroy the corrupted Titans.", dl: "DOWNLOAD ALPHA", key: "secretvoxel", secret: "> ACCESS GRANTED. UNLOCKING LORE..." },
    sk: { sub: "Prestav svet. Znič skazených Titánov.", dl: "STIAHNUŤ ALFU", key: "tajnyvoxel", secret: "> KÓD PRIJATÝ. ODEMYKÁM ZVYŠOK LORU..." },
    ua: { sub: "Перебудуй світ. Знищ зіпсованих Титанів.", dl: "ЗАВАНТАЖИТИ АЛЬФУ", key: "tajnyvoxel", secret: "> КОД ПРИЙНЯТО. РОЗБЛОКУВАННЯ..." },
    ru: { sub: "Перестрой мир. Уничтожь испорченных Титанов.", dl: "СКАЧАТЬ АЛЬФУ", key: "tajnyvoxel", secret: "> КОД ПРИНЯТ. РАЗБЛОКИРОВКА..." },
    de: { sub: "Baue die Welt neu auf.", dl: "HERUNTERLADEN", key: "geheimvoxel" },
    pl: { sub: "Odbuduj świat.", dl: "POBIERZ ALPHĘ", key: "sekretnyvoxel" },
    es: { sub: "Reconstruye el mundo.", dl: "DESCARGAR", key: "voxelosecreto" },
    sv: { sub: "Återuppbygg världen.", dl: "LADDA NER", key: "hemligvoxel" },
    ja: { sub: "世界を再建せよ。", dl: "ダウンロード", key: "himitsuvoxel" }
};

const gameData = {
    cs: {
        shortLore: "<h2>> LORE</h2><p>Voxelie byla digitální simulací. Velký Glitch ji roztříštil. Vy jste poslední Rebuildeři.</p>",
        fullLore: "<h2>> LORE [DECRYPTED]</h2><p>Voxelie byla digitální simulací. Velký Glitch ji roztříštil. Vy jste poslední Rebuildeři.<br><br><span style='color:var(--primary)'>[DODATEK]: Projekt Voxelie byl původně vytvořen jako únik z reality. Jádro bylo infikováno virem 'VOID-0', který mění strukturu bloků na nestabilní hmotu. Jediný způsob opravy je kompletní re-formace sektorů.</span></p>",
        shortBoss: "<h2>> BOSS LIST</h2><p><b>1. Stone Titan</b><br><b>2. Void Serpent</b><br><b>3. Corrupted Core</b></p>"
    }
};

let currentLang = 'cs';
let loreUnlocked = false;

function register() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    if (!user || !pass) return alert('Missing data!');
    let users = JSON.parse(localStorage.getItem('voxelia_users') || "[]");
    if (users.find(u => u.name.toLowerCase() === user.toLowerCase()) || user.toLowerCase() === OWNER_USER) return alert('Taken!');
    users.push({name: user, pass: pass, rank: "ALPHA SURVIVOR", xp: 0});
    localStorage.setItem('voxelia_users', JSON.stringify(users));
    alert('Success!');
}

function login() {
    const uInput = document.getElementById('username').value.trim();
    const pInput = document.getElementById('password').value;
    if (uInput === OWNER_USER && pInput === OWNER_PASS) return completeLogin(OWNER_USER, "OWNER", 999999);
    let users = JSON.parse(localStorage.getItem('voxelia_users') || "[]");
    const found = users.find(u => u.name === uInput && u.pass === pInput);
    if (found) completeLogin(found.name, found.rank, found.xp);
    else alert('Failed!');
}

function completeLogin(name, rank, xp) {
    localStorage.setItem('voxLogged', 'true');
    localStorage.setItem('voxCurrentName', name);
    localStorage.setItem('voxCurrentRank', rank);
    localStorage.setItem('voxCurrentXP', xp);
    location.reload();
}

function showProfile() {
    const name = localStorage.getItem('voxCurrentName');
    const rank = localStorage.getItem('voxCurrentRank');
    const xp = localStorage.getItem('voxCurrentXP');
    document.getElementById('auth-box').style.display = 'none';
    document.getElementById('user-profile').style.display = 'block';
    const nEl = document.getElementById('display-name');
    nEl.innerText = name.toUpperCase();
    document.getElementById('display-rank').innerText = `RANK: ${rank} | XP: ${xp}`;
    if (rank === "OWNER") {
        nEl.style.color = "var(--owner)";
        document.getElementById('admin-tag').style.display = 'block';
        document.getElementById('admin-btn-toggle').style.display = 'inline-block';
    }
}

function toggleAdminPanel() {
    const p = document.getElementById('admin-panel');
    p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function toggleServerStatus() {
    const s = document.getElementById('srv-text');
    s.innerText = s.innerText === 'ONLINE' ? 'OFFLINE' : 'ONLINE';
    s.style.color = s.innerText === 'ONLINE' ? 'var(--primary)' : 'var(--owner)';
}

function logout() { localStorage.clear(); location.reload(); }

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase().trim();
    const st = document.getElementById("secretText");
    const lang = translations[currentLang] || translations['en'];
    
    if (input === lang.key) {
        st.innerText = lang.secret || "> ACCESS GRANTED.";
        loreUnlocked = true;
        setTimeout(showLore, 1000); // Po vteřině automaticky zobrazí odemčený lore
    } else {
        st.innerText = "> INVALID KEY.";
    }
}

function showLore() {
    const data = gameData[currentLang] || gameData['cs'];
    typeWriter(loreUnlocked ? data.fullLore : data.shortLore, "content");
}

function showBoss() { typeWriter(gameData[currentLang]?.shortBoss || gameData['cs'].shortBoss, "content"); }
function showUpdates() { typeWriter("<h2>> LOG v0.1.31</h2><ul><li>UA/RU Support added</li><li>Admin Interface v1</li><li>Decryption sync active</li></ul>", "content"); }

function typeWriter(text, elId) {
    let i = 0; const el = document.getElementById(elId); el.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') { let end = text.indexOf('>', i); el.innerHTML += text.substring(i, end + 1); i = end + 1; }
            else { el.innerHTML += text.charAt(i); i++; }
            setTimeout(typing, 8);
        }
    }
    typing();
}

function setLang(l) {
    currentLang = l;
    document.getElementById('subtitle').innerText = translations[l].sub;
    document.getElementById('btn-dl').innerText = translations[l].dl;
    document.getElementById('content').innerText = "System ready.";
}

const langContainer = document.getElementById('lang-btns');
Object.keys(translations).forEach(l => {
    const b = document.createElement('button'); b.className = 'lang-btn'; b.innerText = l.toUpperCase();
    b.onclick = () => setLang(l); langContainer.appendChild(b);
});

window.onload = () => {
    if (localStorage.getItem('voxLogged') === 'true') showProfile();
    setInterval(() => {
        const n = new Date(); document.getElementById('clock').innerText = `TIME: ${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`;
    }, 1000);
};

// Particles (zůstávají stejné)
const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const parts = [];
for(let i=0; i<60; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, v:Math.random()*0.5});
function anim() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary') + "33";
    parts.forEach(p => { ctx.fillRect(p.x, p.y, 2, 2); p.y -= p.v; if(p.y<0) p.y=canvas.height; });
    requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
