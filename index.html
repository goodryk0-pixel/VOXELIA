<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>
<style>
    :root { 
        --primary: #3cff8f; 
        --secondary: #8a2be2; 
        --bg: #050510; 
        --panel: rgba(10, 10, 26, 0.9); 
    }
    
    body { 
        margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; 
        text-align: center; overflow-x: hidden; cursor: crosshair; transition: 0.8s;
    }

    body.void-mode { --primary: #ff2a2a; --secondary: #4b0082; background: #0d0005; }

    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

    .top-bar { display: flex; justify-content: space-between; padding: 20px; z-index: 100; position: relative; }
    
    .status-group { text-align: left; font-family: monospace; font-size: 12px; color: var(--primary); line-height: 1.5; }
    .dot { height: 8px; width: 8px; background-color: var(--primary); border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
    
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .lang-menu { display: flex; gap: 5px; flex-wrap: wrap; max-width: 300px; justify-content: flex-end; }
    .lang-btn { 
        padding: 4px 8px; font-size: 10px; background: rgba(255,255,255,0.05); 
        border: 1px solid var(--primary); color: var(--primary); cursor: pointer; border-radius: 3px;
    }
    .lang-btn:hover { background: var(--primary); color: #000; }

    h1 { font-size: clamp(50px, 10vw, 100px); margin: 30px 0 5px 0; letter-spacing: 15px; color: var(--primary); cursor: pointer; text-shadow: 0 0 15px var(--primary); }
    h1:hover { animation: glitch 0.3s infinite; }

    .btn-main {
        background: var(--primary); color: black; font-weight: 900; padding: 15px 40px; 
        font-size: 18px; border: none; cursor: pointer; border-radius: 5px; margin: 10px; 
        text-transform: uppercase; box-shadow: 0 0 20px var(--primary); transition: 0.3s;
    }
    .btn-main:hover { transform: scale(1.05); box-shadow: 0 0 40px var(--primary); }

    #content { 
        min-height: 200px; background: var(--panel); max-width: 800px; margin: 20px auto; 
        padding: 30px; border-radius: 5px; border-left: 5px solid var(--primary); text-align: left;
        backdrop-filter: blur(10px); box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    /* Auth System Styles */
    .auth-container {
        background: var(--panel);
        border: 1px solid var(--primary);
        padding: 20px;
        max-width: 300px;
        margin: 20px auto;
        border-radius: 5px;
    }
    .auth-container input {
        width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid var(--primary); color: white;
    }
    #user-profile {
        background: rgba(60, 255, 143, 0.1);
        padding: 15px;
        border-radius: 5px;
        margin: 20px auto;
        max-width: 400px;
        display: none; /* Skryté dokud se nepřihlásí */
    }

    .gallery { display: flex; justify-content: center; gap: 15px; margin: 40px auto; max-width: 800px; flex-wrap: wrap; }
    .screenshot { 
        width: 180px; height: 100px; background: #111; border: 1px solid var(--primary); 
        cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        font-size: 10px; color: var(--primary); text-transform: uppercase;
    }
    .screenshot:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--primary); background: var(--primary); color: #000; }

    @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 100% { transform: translate(0); } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="top-bar">
    <div class="status-group">
        <div><span class="dot"></span> SERVER: <span id="srv-status">ONLINE</span></div>
        <div>> INTEGRITY: <span id="integrity-val">100%</span></div>
        <div id="clock">> TIME: --:--:--</div>
    </div>
    <div class="lang-menu">
        <button class="lang-btn" onclick="setLang('en')">EN</button>
        <button class="lang-btn" onclick="setLang('cs')">CZ</button>
        <button class="lang-btn" onclick="setLang('sk')">SK</button>
    </div>
</div>

<div class="container">
    <h1 onclick="toggleVoid()">VOXELIA</h1>
    
    <div id="auth-box" class="auth-container">
        <h4 id="auth-title">CORE ACCESS</h4>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="lang-btn" onclick="register()">Register</button>
        <button class="lang-btn" onclick="login()" style="background: var(--primary); color: black;">Login</button>
    </div>

    <div id="user-profile">
        <h3>WELCOME, <span id="display-name" style="color: var(--primary);">REBUILDER</span></h3>
        <p style="font-size: 12px; font-family: monospace;">RANK: ALPHA SURVIVOR | XP: 0</p>
        <button class="lang-btn" onclick="logout()">LOGOUT</button>
    </div>

    <p id="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>

    <button id="btn-dl" class="btn-main" onclick="alert('Alpha version 0.1.28 initializing...')">DOWNLOAD ALPHA</button>

    <div style="margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <button class="lang-btn" style="padding: 10px 20px;" onclick="showLore()">Lore</button>
        <button class="lang-btn" style="padding: 10px 20px;" onclick="showBoss()">Bosses</button>
        <button class="lang-btn" style="padding: 10px 20px;" onclick="showUpdates()">Updates</button>
    </div>

    <div id="content">Select a module...</div>

    <div class="gallery">
        <div class="screenshot">Overworld</div>
        <div class="screenshot">The Void</div>
        <div class="screenshot">Titan Nest</div>
    </div>

    <div class="secret">
        <h3 id="secret-title">Decryption Terminal</h3>
        <input id="codeInput" placeholder="Enter key..." style="background:black; border:1px solid var(--primary); color:var(--primary); padding:10px; width: 200px;">
        <button class="lang-btn" onclick="checkCode()">Execute</button>
        <div id="secretText"></div>
    </div>
</div>

<script>
// --- AUTH LOGIC ---
function register() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    if (user && pass) {
        localStorage.setItem('voxUser', user);
        localStorage.setItem('voxPass', pass);
        alert('Account linked to Core! You can now login.');
    } else {
        alert('Fill all encryption fields!');
    }
}

function login() {
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;
    const storedUser = localStorage.getItem('voxUser');
    const storedPass = localStorage.getItem('voxPass');

    if (user === storedUser && pass === storedPass) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        document.getElementById('display-name').innerText = user.toUpperCase();
        localStorage.setItem('voxLogged', 'true');
    } else {
        alert('ACCESS DENIED: Credentials mismatch.');
    }
}

function logout() {
    localStorage.removeItem('voxLogged');
    location.reload();
}

// Check if already logged in
window.onload = function() {
    if (localStorage.getItem('voxLogged') === 'true') {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        document.getElementById('display-name').innerText = localStorage.getItem('voxUser').toUpperCase();
    }
    updateTime();
};

// --- REST OF THE CODE ---
function updateTime() {
    const now = new Date();
    document.getElementById('clock').innerText = `> TIME: ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}`;
}
setInterval(updateTime, 1000);

const translations = {
    en: { sub: "Rebuild the world. Destroy the corrupted Titans.", dl: "DOWNLOAD ALPHA", loreCont: "<h2>> CORE DATA</h2><p>Voxelia is a living structure.</p>", secretKey: "secretvoxel" },
    cs: { sub: "Přestav svět. Znič zkažené Titány.", dl: "STÁHNOUT ALFU", loreCont: "<h2>> DATA JÁDRA</h2><p>Voxelie je živá struktura.</p>", secretKey: "tajnyvoxel" },
    sk: { sub: "Prestav svet. Znič skazených Titánov.", dl: "STIAHNUŤ ALFU", loreCont: "<h2>> DATA JADRA</h2><p>Voxelie je živá štruktúra.</p>", secretKey: "tajnyvoxel" }
};

let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    document.getElementById('subtitle').innerText = translations[lang].sub;
    document.getElementById('btn-dl').innerText = translations[lang].dl;
}

function showLore() { typeWriter(translations[currentLang].loreCont, "content"); }
function showBoss() { typeWriter("<h2>> TITANS</h2><p>Scanning peaks...</p>", "content"); }
function showUpdates() { typeWriter("<h2>> LOG v0.1.28</h2><ul><li>Auth system added</li></ul>", "content"); }

function typeWriter(text, elementId) {
    let i = 0; const el = document.getElementById(elementId); el.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') { let end = text.indexOf('>', i); el.innerHTML += text.substring(i, end + 1); i = end + 1; }
            else { el.innerHTML += text.charAt(i); i++; }
            setTimeout(typing, 10);
        }
    }
    typing();
}

function toggleVoid() {
    document.body.classList.toggle('void-mode');
    const isVoid = document.body.classList.contains('void-mode');
    document.getElementById('srv-status').innerText = isVoid ? "CORRUPTED" : "ONLINE";
    document.getElementById('integrity-val').innerText = isVoid ? "CRITICAL" : "100%";
    document.querySelector('h1').innerText = isVoid ? "V O I D" : "VOXELIA";
}

function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase().trim();
    if (input === translations[currentLang].secretKey) {
        document.getElementById("secretText").innerText = "> ACCESS GRANTED";
    } else {
        document.getElementById("secretText").innerText = "> ACCESS DENIED";
    }
}

const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const parts = [];
for(let i=0; i<60; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, v:Math.random()*0.5});
function anim() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--primary') + "33";
    parts.forEach(p => { ctx.fillRect(p.x, p.y, 2, 2); p.y -= p.v; if(p.y<0) p.y=canvas.height; });
    requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
