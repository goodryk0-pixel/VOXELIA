<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>
<style>
    :root { --primary: #3cff8f; --secondary: #8a2be2; --bg: #050510; --panel: rgba(31, 31, 46, 0.8); }
    body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; overflow-x: hidden; cursor: crosshair; transition: 0.5s; }
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
    
    /* Glitch Mode (Void) */
    body.void-mode { --primary: #ff3c3c; --secondary: #4b0082; background: #0a0005; }

    .lang-menu { position: absolute; top: 20px; right: 20px; display: flex; gap: 8px; flex-wrap: wrap; z-index: 100; }
    .lang-btn { padding: 5px 10px; font-size: 11px; background: rgba(255,255,255,0.05); border: 1px solid var(--primary); color: var(--primary); cursor: pointer; border-radius: 3px; }
    .lang-btn:hover { background: var(--primary); color: black; }

    h1 { font-size: clamp(50px, 10vw, 90px); margin-top: 60px; letter-spacing: 10px; color: var(--primary); cursor: pointer; transition: 0.3s; }
    h1:hover { animation: glitch 0.3s infinite; text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9; }

    .btn-download { background: var(--primary) !important; color: black !important; font-weight: 900; padding: 15px 45px; font-size: 22px; box-shadow: 0 0 20px var(--primary); border: none; cursor: pointer; border-radius: 5px; margin: 25px 0; text-transform: uppercase; }
    .nav-btn { padding: 12px 25px; margin: 8px; background: transparent; border: 2px solid var(--primary); color: var(--primary); cursor: pointer; text-transform: uppercase; font-weight: bold; }
    .nav-btn:hover { background: var(--primary); color: black; }

    #content { min-height: 160px; background: var(--panel); max-width: 700px; margin: 20px auto; padding: 30px; border-radius: 12px; backdrop-filter: blur(8px); border-left: 4px solid var(--primary); text-align: left; }
    
    .secret { margin-top: 60px; padding-bottom: 80px; }
    input { padding: 12px; background: #000; color: var(--primary); border: 1px solid #444; width: 250px; outline: none; }
    #secretText { margin-top: 20px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px var(--primary); }

    @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-3px, 3px); } 40% { transform: translate(-3px, -3px); } 60% { transform: translate(3px, 3px); } 80% { transform: translate(3px, -3px); } 100% { transform: translate(0); } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="lang-menu">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('cs')">CZ</button>
    <button class="lang-btn" onclick="setLang('sk')">SK</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('pl')">PL</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('ja')">JP</button>
</div>

<div class="container">
    <h1 onclick="toggleVoid()">VOXELIA</h1>
    <p id="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>

    <button id="btn-dl" class="btn-download" onclick="alert('Alpha coming soon!')">DOWNLOAD ALPHA</button>

    <div class="btn-group">
        <button id="btn-lore" class="nav-btn" onclick="showLore()">Lore</button>
        <button id="btn-boss" class="nav-btn" onclick="showBoss()">Bosses</button>
    </div>

    <div id="content">Select a module...</div>

    <div class="secret">
        <h3 id="secret-title">Decryption Terminal</h3>
        <input id="codeInput" placeholder="Code...">
        <button id="btn-decrypt" class="nav-btn" onclick="checkCode()">Decrypt</button>
        <div id="secretText"></div>
    </div>
</div>

<script>
const translations = {
    en: { sub: "Rebuild the world. Destroy the corrupted Titans.", dl: "DOWNLOAD ALPHA", lore: "Lore", boss: "Bosses", secT: "Decryption Terminal", decB: "Decrypt", wait: "Select a module...", loreCont: "<h2>> CORE DATA</h2><p>Voxelia is a living structure. A core glitch caused the corruption.</p>", bossCont: "<h2>> TARGETS</h2><p><b>Stone Titan:</b> Mountain crusher.</p>", secretKey: "secretvoxel", bonusLore: "BONUS: The Titans were once humans trying to upload their souls." },
    cs: { sub: "Přestav svět. Znič zkažené Titány.", dl: "STÁHNOUT ALFU", lore: "Příběh", boss: "Bossy", secT: "Dešifrovací Terminál", decB: "Dešifrovat", wait: "Vyber modul...", loreCont: "<h2>> DATA JÁDRA</h2><p>Voxelie je živá struktura. Chyba v jádru způsobila zkázu.</p>", bossCont: "<h2>> CÍLE</h2><p><b>Stone Titan:</b> Drtič hor.</p>", secretKey: "tajnyvoxel", bonusLore: "BONUS: Titáni byli kdysi lidé pokoušející se nahrát svou duši do sítě." },
    sk: { sub: "Prestav svet. Znič skazených Titánov.", dl: "STIAHNUŤ ALFU", lore: "Príbeh", boss: "Bossia", secT: "Dešifrovací Terminál", decB: "Dešifrovať", wait: "Vyber modul...", loreCont: "<h2>> DATA JADRA</h2><p>Voxelie je živá štruktúra. Chyba v jadre spôsobila skazu.</p>", bossCont: "<h2>> CIELE</h2><p><b>Stone Titan:</b> Drvič hôr.</p>", secretKey: "tajnyvoxel", bonusLore: "BONUS: Titáni boli kedysi ľudia pokúšajúci sa nahrať svoju dušu do siete." },
    de: { sub: "Baue die Welt neu auf.", dl: "ALPHA DOWNLOAD", lore: "Geschichte", boss: "Bosse", secT: "Terminal", decB: "Entschlüsseln", wait: "Modul wählen...", loreCont: "<h2>> DATEN</h2><p>Voxelia ist eine Struktur.</p>", bossCont: "<h2>> ZIELE</h2><p><b>Stone Titan:</b> Bergzermalmer.</p>", secretKey: "geheimvoxel", bonusLore: "BONUS: Die Titanen waren einst Menschen." },
    pl: { sub: "Odbuduj świat.", dl: "POBIERZ ALPHĘ", lore: "Lore", boss: "Bossowie", secT: "Terminal", decB: "Deszyfruj", wait: "Wybierz moduł...", loreCont: "<h2>> DANE</h2><p>Voxelia to struktura.</p>", bossCont: "<h2>> CELE</h2><p><b>Kamienny Tytan.</b></p>", secretKey: "sekretnyvoxel", bonusLore: "BONUS: Tytani byli kiedyś ludźmi." },
    es: { sub: "Reconstruye el mundo.", dl: "DESCARGAR", lore: "Historia", boss: "Jefes", secT: "Terminal", decB: "Descifrar", wait: "Seleccionar...", loreCont: "<h2>> DATOS</h2><p>Voxelia es vida.</p>", bossCont: "<h2>> OBJETIVOS</h2><p><b>Titán de Piedra.</b></p>", secretKey: "voxelosecreto", bonusLore: "BONUS: Los Titanes fueron humanos." },
    ja: { sub: "世界を再建せよ。", dl: "ダウンロード", lore: "伝承", boss: "ボス", secT: "解読端末", decB: "解読", wait: "選択...", loreCont: "<h2>> コアデータ</h2><p>ヴォクセリアは構造体です。</p>", bossCont: "<h2>> ターゲット</h2><p><b>ストーン・タイタン。</b></p>", secretKey: "himitsuvoxel", bonusLore: "ボーナス：タイタンはかつて人間だった。" }
};

let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('subtitle').innerText = t.sub;
    document.getElementById('btn-dl').innerText = t.dl;
    document.getElementById('btn-lore').innerText = t.lore;
    document.getElementById('btn-boss').innerText = t.boss;
    document.getElementById('secret-title').innerText = t.secT;
    document.getElementById('btn-decrypt').innerText = t.decB;
    document.getElementById('content').innerText = t.wait;
}

function showLore() { typeWriter(translations[currentLang].loreCont, "content"); }
function showBoss() { typeWriter(translations[currentLang].bossCont, "content"); }

function typeWriter(text, elementId) {
    let i = 0; const el = document.getElementById(elementId); el.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') { let end = text.indexOf('>', i); el.innerHTML += text.substring(i, end + 1); i = end + 1; }
            else { el.innerHTML += text.charAt(i); i++; }
            setTimeout(typing, 15);
        }
    }
    typing();
}

// OPRAVENÁ FUNKCE KÓDŮ
function checkCode() {
    const input = document.getElementById("codeInput").value.toLowerCase().trim();
    const st = document.getElementById("secretText");
    let found = false;

    for (let l in translations) {
        if (input === translations[l].secretKey) {
            st.style.color = "var(--primary)";
            typeWriter("> ACCESS GRANTED: " + translations[currentLang].bonusLore, "secretText");
            document.body.style.boxShadow = "inset 0 0 100px var(--secondary)";
            found = true; break;
        }
    }
    if (!found) { st.style.color = "red"; st.innerText = "> ERROR: INVALID KEY"; }
}

function toggleVoid() {
    document.body.classList.toggle('void-mode');
    const h1 = document.querySelector('h1');
    h1.innerText = document.body.classList.contains('void-mode') ? "V O I D" : "VOXELIA";
}

// Particles
const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const parts = [];
for(let i=0; i<50; i++) parts.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2, v:Math.random()*0.5});
function anim() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#3cff8f22";
    parts.forEach(p => { ctx.fillRect(p.x, p.y, p.s, p.s); p.y -= p.v; if(p.y<0) p.y=canvas.height; });
    requestAnimationFrame(anim);
}
anim();
</script>
</body>
</html>
