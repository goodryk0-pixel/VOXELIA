<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voxelia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f0f0f, #000);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* glowing background effect */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(0,255,150,0.1), transparent 70%);
    animation: pulse 6s infinite;
    z-index: -1;
}

@keyframes pulse {
    0% {opacity: 0.4;}
    50% {opacity: 1;}
    100% {opacity: 0.4;}
}

h1 {
    font-size: 90px;
    margin-top: 120px;
    letter-spacing: 8px;
    background: linear-gradient(45deg, #4CAF50, #66ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

p {
    color: #aaa;
    font-size: 22px;
}

/* button */
button {
    margin-top: 50px;
    padding: 18px 60px;
    font-size: 22px;
    border: none;
    border-radius: 15px;
    background: linear-gradient(45deg, #4CAF50, #00ffaa);
    color: black;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(0,255,150,0.5);
}

button:hover {
    transform: scale(1.15);
    box-shadow: 0 0 40px rgba(0,255,150,1);
}

/* sections */
.section {
    margin-top: 150px;
}

/* cards */
.card {
    background: #111;
    padding: 30px;
    margin: 20px;
    border-radius: 20px;
    display: inline-block;
    width: 260px;
    transition: 0.4s;
    box-shadow: 0 0 10px rgba(0,255,150,0.2);
}

.card:hover {
    transform: translateY(-15px) scale(1.05);
    box-shadow: 0 0 25px rgba(0,255,150,0.8);
}

/* footer */
.footer {
    margin-top: 150px;
    padding: 20px;
    color: #666;
}
</style>
</head>

<body>

<h1>VOXELIA</h1>
<p>Build. Explore. Survive.</p>

<button onclick="alert('Game coming soon 😄')">
    DOWNLOAD
</button>

<div class="section">
    <h2>Features</h2>

    <div class="card">🧱 Build Anything</div>
    <div class="card">🌍 Infinite Worlds</div>
    <div class="card">⚒️ Mine Resources</div>
    <div class="card">🔥 Survival Mode</div>
</div>

<div class="section">
    <h2>About Voxelia</h2>
    <p>
        Voxelia is a voxel-based sandbox game where you can create, explore,
        and survive in a limitless world made of blocks.
    </p>
</div>

<div class="footer">
    © 2026 Voxelia
</div>

</body>
</html>
