<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOXELIA | Official Site</title>

<style>
    :root {
        --primary: #3cff8f;
        --secondary: #8a2be2;
        --bg: #050510;
        --panel: rgba(31, 31, 46, 0.8);
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: white;
        text-align: center;
        overflow-x: hidden;
        cursor: crosshair;
    }

    #bg-canvas {
        position: fixed;
        top: 0;
        left: 0;
        z-index: -1;
    }

    /* LANGUAGE SWITCHER */
    .lang-menu {
        position: absolute;
        top: 20px;
        right: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
        max-width: 300px;
    }

    .lang-btn {
        padding: 5px 10px;
        font-size: 12px;
        background: rgba(255,255,255,0.1);
        border: 1px solid var(--primary);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        border-radius: 3px;
    }

    .lang-btn:hover {
        background: var(--primary);
        color: black;
    }

    .container {
        animation: fadeIn 1.5s ease-out;
        padding: 20px;
    }

    h1 {
        font-size: clamp(50px, 10vw, 90px);
        margin-top: 60px;
        letter-spacing: 10px;
        color: var(--primary);
        display: inline-block;
    }

    h1:hover {
        animation: glitch 0.3s infinite;
        text-shadow: 2px 2px #ff00c1, -2px -2px #00fff9;
    }

    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-2px, 2px); }
        40% { transform: translate(-2px, -2px); }
        60% { transform: translate(2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }

    .btn-download {
        background: var(--primary) !important;
        color: black !important;
        font-weight: 900 !important;
        padding: 15px 40px !important;
        font-size: 20px !important;
        box-shadow: 0 0 20px var(--primary);
        border: none !important;
        cursor: pointer;
        border-radius: 5px;
        margin: 20px 0;
        text-transform: uppercase;
    }

    .btn-download:hover { transform: scale(1.1); box-shadow: 0 0 30px var(--primary); }

    button.nav-btn {
        padding: 12px 25px;
        margin: 5px;
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        cursor: pointer;
        text-transform: uppercase;
    }

    button.nav-btn:hover { background: var(--primary); color: black; }

    .progress-container { width: 80%; max-width: 500px; margin: 30px auto; }
    .progress { background: #111; height: 20px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
    .progress-bar { 
        width: 27%; height: 100%; 
        background: linear-gradient(90deg, var(--secondary), var(--primary)); 
        animation: gradientMove 3s infinite; 
    }

    @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    #content {
        min-height: 150px;
        background: var(--panel);
        max-width: 700px;
        margin: 20px auto;
        padding: 25px;
        border-radius: 10px;
        backdrop-filter: blur(5px);
        border-left: 4px solid var(--primary);
        text-align: left;
    }

    .secret input { padding: 10px; background: #000; color: var(--primary); border: 1px solid #444; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="lang-menu">
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('cs')">CZ</button>
    <button class="lang-btn" onclick="setLang('sk')">SK</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <button class="lang-btn" onclick="setLang('pl')">PL</button>
    <button class="lang-btn" onclick="setLang('es')">ES</button>
    <button class="lang-btn" onclick="setLang('sv')">SV</button>
    <button class="lang-btn" onclick="setLang('ja')">JP</button>
</div>

<div class="container">
    <h1>VOXELIA</h1>
    <p id="subtitle" class="subtitle">Rebuild the world. Destroy the corrupted Titans.</p>

    <div class="download-section">
        <button id="btn-dl" class="btn-download" onclick="triggerDl()">DOWNLOAD ALPHA</button>
    </div>

    <div class="btn-group">
        <button id="btn-lore" class="nav-btn" onclick="showLore()">Lore</button>
        <button id="btn-boss" class="nav-btn" onclick="showBoss()">Bosses</button>
    </div>

    <div id="content">Select a module...</div>

    <div class="progress-container">
        <p id="prog-text">SYSTEM RECONSTRUCTION</p>
        <div class="progress"><div class="progress-bar"></div></div>
    </div>

    <div class="secret">
        <h3 id="secret-title">Decryption Terminal</h3>
        <input id="codeInput" placeholder="Code...">
        <button id="btn-decrypt" onclick="checkCode()">Decrypt</button>
        <div id="secretText"></div>
    </div>
</div>

let currentLang = 'en';

function setLang(lang) {
    currentLang = lang;
    const t = translations[lang];
    document.getElementById('subtitle').innerText = t.sub;
    document.getElementById('btn-dl').innerText = t.dl;
    document.getElementById('btn-lore').innerText = t.lore;
    document.getElementById('btn-boss').innerText = t.boss;
    document.getElementById('prog-text').innerText = t.prog;
    document.getElementById('secret-title').innerText = t.secT;
    document.getElementById('btn-decrypt').innerText = t.decB;
    document.getElementById('content').innerText = t.wait;
}

function showLore() { typeWriter(translations[currentLang].loreCont, "content"); }
function showBoss() { typeWriter(translations[currentLang].bossCont, "content"); }
function triggerDl() { alert(translations[currentLang].dlMsg); }

function typeWriter(text, elementId) {
    let i = 0;
    const element = document.getElementById(elementId);
    element.innerHTML = "";
    function typing() {
        if (i < text.length) {
            if (text.charAt(i) === '<') {
                let tagEnd = text.indexOf('>', i);
                element.innerHTML += text.substring(i, tagEnd + 1);
                i = tagEnd + 1;
            } else {
                element.innerHTML += text.charAt(i);
                i++;
            }
            setTimeout(typing, 10);
        }
    }
    typing();
}

function checkCode() {
    const code = document.getElementById("codeInput").value.toLowerCase();
    const st = document.getElementById("secretText");
    if (code === "secretvoxel") {
        st.style.color = "var(--primary)";
        st.innerHTML = translations[currentLang].secMsg;
    } else {
        st.style.color = "red";
        st.innerHTML = "ERR: 404";
    }
}

// Background Canvas Logic
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
const particles = [];
for(let i=0; i<60; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*3+1, v:Math.random()*0.5+0.1});
function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = "#3cff8f15";
    particles.forEach(p => { ctx.fillRect(p.x, p.y, p.s, p.s); p.y -= p.v; if(p.y < -5) p.y = canvas.height+5; });
    requestAnimationFrame(animate);
}
animate();
window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
